<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#0f0c29;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#302b63;stop-opacity:1" />
    </radialGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa" />
      <stop offset="50%" style="stop-color:#60a5fa" />
      <stop offset="100%" style="stop-color:#34d399" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a78bfa" />
      <stop offset="100%" style="stop-color:#60a5fa" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="200" r="195" fill="url(#bgGrad)" />

  <!-- Outer decorative ring -->
  <circle cx="200" cy="200" r="185" fill="none" stroke="url(#ringGrad)" stroke-width="2" stroke-dasharray="8 4" opacity="0.6"/>

  <!-- Orbiting dots -->
  <circle cx="200" cy="15" r="5" fill="#a78bfa" filter="url(#glow)"/>
  <circle cx="385" cy="200" r="5" fill="#60a5fa" filter="url(#glow)"/>
  <circle cx="200" cy="385" r="5" fill="#34d399" filter="url(#glow)"/>
  <circle cx="15" cy="200" r="5" fill="#f472b6" filter="url(#glow)"/>

  <!-- Neural network nodes — outer ring -->
  <circle cx="200" cy="65"  r="8" fill="#a78bfa" filter="url(#glow)" opacity="0.9"/>
  <circle cx="320" cy="120" r="8" fill="#60a5fa" filter="url(#glow)" opacity="0.9"/>
  <circle cx="355" cy="255" r="8" fill="#34d399" filter="url(#glow)" opacity="0.9"/>
  <circle cx="275" cy="355" r="8" fill="#fbbf24" filter="url(#glow)" opacity="0.9"/>
  <circle cx="125" cy="355" r="8" fill="#f472b6" filter="url(#glow)" opacity="0.9"/>
  <circle cx="45"  cy="255" r="8" fill="#a78bfa" filter="url(#glow)" opacity="0.9"/>
  <circle cx="80"  cy="120" r="8" fill="#60a5fa" filter="url(#glow)" opacity="0.9"/>

  <!-- Neural network nodes — middle ring -->
  <circle cx="200" cy="110" r="6" fill="#c4b5fd" opacity="0.7"/>
  <circle cx="295" cy="160" r="6" fill="#93c5fd" opacity="0.7"/>
  <circle cx="310" cy="265" r="6" fill="#6ee7b7" opacity="0.7"/>
  <circle cx="240" cy="320" r="6" fill="#fcd34d" opacity="0.7"/>
  <circle cx="160" cy="320" r="6" fill="#f9a8d4" opacity="0.7"/>
  <circle cx="90"  cy="265" r="6" fill="#c4b5fd" opacity="0.7"/>
  <circle cx="105" cy="160" r="6" fill="#93c5fd" opacity="0.7"/>

  <!-- Connection lines — outer to middle -->
  <line x1="200" y1="65"  x2="200" y2="110" stroke="#a78bfa" stroke-width="1" opacity="0.4"/>
  <line x1="320" y1="120" x2="295" y2="160" stroke="#60a5fa" stroke-width="1" opacity="0.4"/>
  <line x1="355" y1="255" x2="310" y2="265" stroke="#34d399" stroke-width="1" opacity="0.4"/>
  <line x1="275" y1="355" x2="240" y2="320" stroke="#fbbf24" stroke-width="1" opacity="0.4"/>
  <line x1="125" y1="355" x2="160" y2="320" stroke="#f472b6" stroke-width="1" opacity="0.4"/>
  <line x1="45"  y1="255" x2="90"  y2="265" stroke="#a78bfa" stroke-width="1" opacity="0.4"/>
  <line x1="80"  y1="120" x2="105" y2="160" stroke="#60a5fa" stroke-width="1" opacity="0.4"/>

  <!-- Connection lines — cross links -->
  <line x1="200" y1="110" x2="295" y2="160" stroke="#a78bfa" stroke-width="0.8" opacity="0.25"/>
  <line x1="295" y1="160" x2="310" y2="265" stroke="#60a5fa" stroke-width="0.8" opacity="0.25"/>
  <line x1="310" y1="265" x2="240" y2="320" stroke="#34d399" stroke-width="0.8" opacity="0.25"/>
  <line x1="240" y1="320" x2="160" y2="320" stroke="#fbbf24" stroke-width="0.8" opacity="0.25"/>
  <line x1="160" y1="320" x2="90"  y2="265" stroke="#f472b6" stroke-width="0.8" opacity="0.25"/>
  <line x1="90"  y1="265" x2="105" y2="160" stroke="#a78bfa" stroke-width="0.8" opacity="0.25"/>
  <line x1="105" y1="160" x2="200" y2="110" stroke="#60a5fa" stroke-width="0.8" opacity="0.25"/>

  <!-- Lines to center -->
  <line x1="200" y1="110" x2="200" y2="200" stroke="#a78bfa" stroke-width="1" opacity="0.3"/>
  <line x1="295" y1="160" x2="200" y2="200" stroke="#60a5fa" stroke-width="1" opacity="0.3"/>
  <line x1="310" y1="265" x2="200" y2="200" stroke="#34d399" stroke-width="1" opacity="0.3"/>
  <line x1="240" y1="320" x2="200" y2="200" stroke="#fbbf24" stroke-width="1" opacity="0.3"/>
  <line x1="160" y1="320" x2="200" y2="200" stroke="#f472b6" stroke-width="1" opacity="0.3"/>
  <line x1="90"  y1="265" x2="200" y2="200" stroke="#a78bfa" stroke-width="1" opacity="0.3"/>
  <line x1="105" y1="160" x2="200" y2="200" stroke="#60a5fa" stroke-width="1" opacity="0.3"/>

  <!-- Central glow -->
  <circle cx="200" cy="200" r="40" fill="#1e1b4b" opacity="0.9"/>
  <circle cx="200" cy="200" r="36" fill="none" stroke="url(#ringGrad)" stroke-width="2" filter="url(#softglow)"/>

  <!-- T9 text in center -->
  <text x="200" y="193" font-family="'Arial Black', sans-serif" font-size="22" font-weight="900"
        fill="url(#textGrad)" text-anchor="middle" filter="url(#glow)">T</text>
  <text x="200" y="216" font-family="'Arial Black', sans-serif" font-size="16" font-weight="900"
        fill="#60a5fa" text-anchor="middle" opacity="0.9">9</text>

  <!-- Bottom label -->
  <text x="200" y="368" font-family="'Arial', sans-serif" font-size="11" font-weight="600"
        fill="#a78bfa" text-anchor="middle" letter-spacing="3" opacity="0.8">TRIBEBOT</text>
</svg>
